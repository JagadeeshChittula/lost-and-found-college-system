{% extends "base.html" %}
{% block content %}
<section class="admin">
  <div class="admin-hero">
    <div>
      <p class="eyebrow">Moderation Center</p>
      <h2>Reports</h2>
      <p class="muted">Review reports submitted by users.</p>
    </div>
  </div>

  <nav class="admin-nav">
    <a href="{{ url_for('admin') }}">Dashboard</a>
    <a href="{{ url_for('admin_users') }}">Users</a>
    <a href="{{ url_for('admin_items') }}">Items</a>
    <a href="{{ url_for('admin_claims') }}">Claims</a>
    <a class="active" href="{{ url_for('admin_reports') }}">Reports</a>
  </nav>

  <div class="admin-section">
    <div class="admin-grid">
      {% for r in reports %}
      <div class="admin-card">
        <div><strong>{{ r['reporter_name'] }}</strong> reported: {{ r['message_body'] }}</div>
        <div class="muted">Reason: {{ r['reason'] }}</div>
        <form method="post" action="{{ url_for('admin_delete_message') }}">
          <input type="hidden" name="message_id" value="{{ r['message_id'] }}" />
          <button class="btn danger" type="submit">Delete Message</button>
        </form>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
