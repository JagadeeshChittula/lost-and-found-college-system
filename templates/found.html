{% extends "base.html" %}
{% block content %}
<section class="form-card">
  <h2>Report a Found Item</h2>
  <p>Help someone get their item back by submitting the details.</p>
  <form id="foundForm" class="form" enctype="multipart/form-data">
    <div class="grid">
      <label>Found Item Name
        <input type="text" name="name" required />
      </label>
      <label>Contact Person
        <input type="text" name="contact" required />
      </label>
      <label>Email
        <input type="email" name="email" />
      </label>
      <label>Date Found
        <input type="date" name="item_date" required />
      </label>
      <label>Description
        <input type="text" name="description" placeholder="Where found, color" />
      </label>
      <label>Upload Photo</label>
      <div class="file-field">
        <input id="foundPhoto" class="file-input" type="file" name="photo" accept="image/*" />
        <label class="file-button" for="foundPhoto">Choose File</label>
        <span class="file-name" data-empty="No file chosen">No file chosen</span>
      </div>
    </div>
    <button class="btn" type="submit">Submit Found Item</button>
    <div class="form-status" id="foundStatus"></div>
  </form>
</section>
{% endblock %}
