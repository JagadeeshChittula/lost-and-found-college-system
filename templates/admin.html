{% extends "base.html" %}
{% block content %}
<section class="admin">
  <div class="admin-hero">
    <div>
      <p class="eyebrow">Moderation Center</p>
      <h2>Admin Dashboard</h2>
      <p class="muted">Review users, items, claims, and reports in one place.</p>
    </div>
    </div>
  </div>
  <nav class="admin-nav">
    <a href="{{ url_for('admin_users') }}">Users</a>
    <a href="{{ url_for('admin_items') }}">Items</a>
    <a href="{{ url_for('admin_claims') }}">Claims</a>
    <a href="{{ url_for('admin_reports') }}">Reports</a>
  </nav>

  <div class="admin-summary">
    <div class="summary-card">
      <div class="summary-label">Users</div>
      <div class="summary-value">{{ users_count }}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Items</div>
      <div class="summary-value">{{ items_count }}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Claims</div>
      <div class="summary-value">{{ claims_count }}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Reports</div>
      <div class="summary-value">{{ reports_count }}</div>
    </div>
  </div>
</section>
{% endblock %}
